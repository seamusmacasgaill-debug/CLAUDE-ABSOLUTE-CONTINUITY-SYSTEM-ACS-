name: ACS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify-scripts:
    name: verify-scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install anthropic python-docx --quiet
      - run: python -m py_compile scripts/verify_state.py
      - run: python -m py_compile scripts/acs_ingest.py
      - run: bash -n setup.sh
      - run: bash -n scripts/init_acs.sh

  lint-shell:
    name: lint-shell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y shellcheck
      - run: shellcheck --severity=warning setup.sh
      - run: shellcheck --severity=warning scripts/init_acs.sh

  check-docs:
    name: check-docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          for f in README.md LICENSE setup.sh docs/ACS_PROTOCOL.md \
            scripts/verify_state.py scripts/acs_ingest.py \
            templates/CLAUDE.md .github/CODEOWNERS; do
            [ -f "$f" ] && echo "OK: $f" || { echo "MISSING: $f"; exit 1; }
          done
